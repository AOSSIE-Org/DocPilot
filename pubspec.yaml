name: doc_pilot_new_app_gradel_fix
description: "DocPilot - AI-powered medical documentation assistant"
publish_to: 'none'

version: 2.1.0+5

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # Core utilities
  path_provider: ^2.1.2
  path: ^1.8.0
  http: ^1.2.0
  permission_handler: ^12.0.0
  flutter_dotenv: ^6.0.0
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3
  uuid: ^4.4.0
  intl: ^0.20.0
  crypto: ^3.0.3
  connectivity_plus: ^7.0.0

  # Audio
  record: ^6.2.0
  just_audio: ^0.10.0

  # UI
  flutter_markdown: ^0.7.0
  share_plus: ^12.0.0
  flutter_screenutil: ^5.9.3
  auto_size_text: ^3.0.0
  image_picker: ^1.1.2

  # State management
  provider: ^6.1.2

  # Firebase - Updated to latest stable versions
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_messaging: ^16.1.0
  firebase_storage: ^13.2.0

  # Auth
  google_sign_in: ^7.1.0
  sign_in_with_apple: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  assets:
    - .env
    - assets/images/

  uses-material-design: true

flutter_launcher_icons:
  image_path: "assets/images/docpilot_logo.png"
  image_path_android: "assets/images/docpilot_logo.png"
  image_path_ios: "assets/images/docpilot_logo.png"
  min_sdk_android: 21
  android: true
  ios: true
  web:
    image_path: "assets/images/docpilot_logo.png"
    background_color: "#ffffff"
